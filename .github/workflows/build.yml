name: Build Symfony artifact

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, fileinfo, openssl
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative

      - name: Clear and warmup cache (prod)
        run: |
          APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear
          APP_ENV=prod APP_DEBUG=0 php bin/console cache:warmup

      - name: Generate SQL schema dump
        run: APP_ENV=prod APP_DEBUG=0 php bin/console doctrine:schema:create --dump-sql > database/necrodefensestore_schema.sql

      - name: Build deploy artifact
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='var/log/*' \
            --exclude='var/cache/*' \
            ./ deploy/

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: necrodefense-deploy
          path: deploy/
